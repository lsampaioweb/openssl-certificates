---
# Specify if more messages should be displayed during the executions. Defaults to false if not specified.
debug: true

# Domain for certificates. Options: home, homelab. Defaults to home if not specified.
# domain_context: "home"
# domain_context: "homelab"

# Environment of the execution. Options: stg, prd. Defaults to prd if not specified.
# execution_environment: "stg"
# execution_environment: "prd"

# Path to search for certificates.
# path: "/opt/certificates"

# List of certificates to process.
# Leave empty [] to process all certificates.
certificates:
  - "edge-firewall"
  # - "edge-grafana"
  # - "edge-jump-server"
