---
galaxy_info:
  namespace: "lsampaioweb"
  role_name: "import"
  author: "Luciano Sampaio"
  description: "Deploys SSL/TLS certificates to target servers with application-specific configurations for SpringBoot, Tomcat, Traefik and other platforms."
  license: "MIT"
  company: "Homelab"

  min_ansible_version: "2.15"

  platforms:
    - name: "Debian"
      versions:
        - "bullseye"
        - "bookworm"
    - name: "Ubuntu"
      versions:
        - "focal"
        - "jammy"
    - name: "MacOSX"
      versions:
        - "all"

  galaxy_tags:
    - "ssl"
    - "tls"
    - "certificate"
    - "pki"
    - "deployment"
    - "import"
    - "security"

dependencies:
  - role: "common"
