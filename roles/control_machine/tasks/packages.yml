---
- name: "Updating packages cache"
  ansible.builtin.apt:
    update_cache: true

- name: "Installing required packages"
  ansible.builtin.include_tasks: "{{ path_packages_apt }}"
  vars:
    packages:
      - {name: "sshpass"}
      - {name: "libsecret-tools"}
      - {name: "python-is-python3"}
      - {name: "pipx"} # A tool for installing and managing Python packages.
      - {name: "python3-passlib"} # Required to use bcrypt.
      - {name: "python3-jmespath"} # Required to use bcrypt.
      - {name: "python3-pexpect"} # To enable ansible scripts that use the
      - {name: "python3-openssl"}
      - {name: "python3-cryptography"}
      - {name: "python3-setuptools"}
      - {name: "python3-idna"}

- name: "Installing PIPX packages"
  ansible.builtin.import_role:
    name: "common"
    tasks_from: "debian/packages/pipx"
  vars:
    packages: "{{ pipx_packages }}"

- name: "Installing Ansible Galaxy collections"
  ansible.builtin.import_role:
    name: "common"
    tasks_from: "debian/packages/ansible-galaxy"
  vars:
    packages: "{{ ansible_galaxy_collections }}"
