---
- name: "Calculating days until expiry for {{ cert_key }}"
  ansible.builtin.set_fact:
    cert_expiry_datetime: "{{ cert_data.expiry_date | to_datetime(context_vars.certificate_datetime_format) }}"
    current_datetime: "{{ ansible_facts['date_time']['iso8601'] | to_datetime(context_vars.ansible_datetime_format) }}"

- name: "Computing days until expiry"
  ansible.builtin.set_fact:
    certificate_days_to_expire: "{{ (cert_expiry_datetime - current_datetime).days }}"

- name: "Determining certificate-specific alert thresholds"
  ansible.builtin.set_fact:
    cert_yellow_threshold: "{{ cert_data.days_for_yellow_alert | default(context_vars.auto_renewal.days_for_yellow_alert, true) | int }}"
    cert_red_threshold: "{{ cert_data.days_for_red_alert | default(context_vars.auto_renewal.days_for_red_alert, true) | int }}"

- name: "Determining alert zone for certificate"
  ansible.builtin.set_fact:
    certificate_is_green: "{{ certificate_days_to_expire | int > cert_yellow_threshold }}"
    certificate_alert_is_yellow: "{{ (certificate_days_to_expire | int <= cert_yellow_threshold) and
                           (certificate_days_to_expire | int > cert_red_threshold) }}"
    certificate_alert_is_red: "{{ (certificate_days_to_expire | int <= cert_red_threshold) and (certificate_days_to_expire | int > 0) }}"
    is_expired: "{{ certificate_days_to_expire | int <= 0 }}"

- name: "Processing alert for certificate '{{ cert_key }}'"
  when: not (certificate_is_green | bool)
  block:
    - name: "Checking if already notified today"
      ansible.builtin.set_fact:
        last_notification_date: "{{ cert_data.last_notification | to_datetime(context_vars.certificate_datetime_format)
          if cert_data.last_notification else none }}"
        today_start: "{{ current_datetime.strftime('%Y-%m-%d') | to_datetime('%Y-%m-%d') }}"

    - name: "Determining if notification needed"
      ansible.builtin.set_fact:
        notification_needed: "{{ (last_notification_date is none) or (last_notification_date < today_start) }}"

    - name: "Sending notification for certificate '{{ cert_key }}' in alert zone"
      when: notification_needed | bool
      block:
        - name: "Loading config files"
          ansible.builtin.include_role:
            name: "pki"
            tasks_from: "load_config_files.yml"

        - name: "Reconstructing certificate path and file variables"
          ansible.builtin.set_fact:
            certificate_path: "{{ cert_key }}"
            certificate_file: "{{ (cert_key | basename) ~ '.' ~ config_vars.certificate.extension }}"

        - name: "Loading certificate file details"
          community.crypto.x509_certificate_info:
            path: "{{ certificate_file }}"
            valid_at:
              point_1: "+{{ config_vars.auto_renewal.days_for_yellow_alert }}d"
              point_2: "+{{ config_vars.auto_renewal.days_for_red_alert }}d"
          register: "certificate_info"

        - name: "Sending notification for certificate '{{ certificate_info.subject.commonName }}'"
          ansible.builtin.include_role:
            name: "notify"
            tasks_from: "main.yml"
          vars:
            # Specify that the execution is from the Verify playbook.
            verify_execution: true

        - name: "Updating metadata with notification timestamp"
          ansible.builtin.set_fact:
            metadata: >-
              {{ metadata | combine({
                  'last_updated': now(utc=true, fmt=context_vars.certificate_datetime_format),
                  'certificates': metadata.certificates | combine({
                      (cert_key): cert_data | combine({
                        'last_notification': now(utc=true, fmt=context_vars.certificate_datetime_format)
                      })
                    })
                }, recursive=True) }}

        - name: "Saving updated metadata to file"
          ansible.builtin.include_role:
            name: "metadata"
            tasks_from: "write_metadata.yml"
