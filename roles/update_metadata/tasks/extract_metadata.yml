---
- name: "Creating the basic variables"
  ansible.builtin.set_fact:
    metadata: {}

- name: "Parsing certificate to extract expiry date"
  community.crypto.x509_certificate_info:
    path: "{{ certificate_file }}"
    valid_at:
      point_1: "+{{ config_vars.auto_renewal.days_for_yellow_alert }}d"
      point_2: "+{{ config_vars.auto_renewal.days_for_red_alert }}d"
  register: "certificate_info"

- name: "Calculating alert status based on expiry date"
  ansible.builtin.set_fact:
    alert_status: "{{ 'expired' if certificate_info.expired
      else ('red' if (not certificate_info.valid_at.point_2)
      else ('yellow' if (not certificate_info.valid_at.point_1)
      else 'green')) }}"

- name: "Checking if lock file exists at '{{ context_vars.lock_file_path }}'"
  ansible.builtin.stat:
    path: "{{ context_vars.lock_file_path }}"
  register: "lock_file_stat"

- name: "Waiting for lock file to be released if it exists"
  when: lock_file_stat.stat.exists | bool
  ansible.builtin.wait_for:
    path: "{{ context_vars.lock_file_path }}"
    state: "absent"
    timeout: "{{ context_vars.lock_timeout_seconds }}"

- name: "Creating lock file to prevent concurrent access at '{{ context_vars.lock_file_path }}'"
  ansible.builtin.file:
    path: "{{ context_vars.lock_file_path }}"
    state: "touch"
    mode: "0644"

- name: "Checking if metadata file already exists at '{{ context_vars.metadata_file_path }}'"
  ansible.builtin.stat:
    path: "{{ context_vars.metadata_file_path }}"
  register: "metadata_file_stat"

- name: "Reading existing metadata file if it exists"
  when: metadata_file_stat.stat.exists | bool
  block:
    - name: "Retrieving metadata file content at '{{ context_vars.metadata_file_path }}'"
      ansible.builtin.slurp:
        src: "{{ context_vars.metadata_file_path }}"
      register: "metadata_file_content"

    - name: "Parsing metadata file as JSON"
      ansible.builtin.set_fact:
        metadata: "{{ metadata_file_content.content | b64decode | from_json }}"

- name: "Initializing metadata if not already loaded"
  when: metadata == {}
  ansible.builtin.set_fact:
    metadata:
      version: "1.0"
      last_updated: "{{ ansible_facts['date_time']['iso8601'] }}"
      certificates: {}

- name: "Checking if certificate metadata needs to be updated"
  ansible.builtin.set_fact:
    cert_key: "{{ temp_cert_key }}"
    cert_in_metadata: "{{ temp_cert_key in metadata.certificates }}"
    # If the certificate is not in the metadata file, we need to add it.
    metadata_changed: "{{ temp_cert_key not in metadata.certificates }}"
  vars:
    temp_cert_key: "{{ certificate_domain ~ '/' ~ execution_environment ~ '/' ~ certificate_name }}"

- name: "Determining if metadata values have changed"
  when: cert_in_metadata
  ansible.builtin.set_fact:
    metadata_changed: "{{
      (metadata.certificates[cert_key]['expiry_date'] != certificate_info.not_after) or
      (metadata.certificates[cert_key]['alert_status'] != alert_status)
      }}"
