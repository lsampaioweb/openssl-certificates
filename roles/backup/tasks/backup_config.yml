---
- name: "Creating backup variables"
  ansible.builtin.set_fact:
    certificate_backup_path: "{{ certificate_path ~ '/' ~ context_vars.backup_directory }}"

- name: "Finding the most recent backup file created by template module"
  ansible.builtin.find:
    paths: "{{ certificate_path }}"
    patterns: "{{ context_vars.config_file }}.*~"
    file_type: "file"
  register: "template_backup_files"

- name: "Processing backup files created by template module"
  when: template_backup_files.files | length > 0
  block:
    - name: "Creating backup directory for config file at {{ certificate_backup_path }}"
      ansible.builtin.file:
        path: "{{ certificate_backup_path }}"
        state: "directory"
        recurse: true

    - name: "Calculating checksums of new backup files"
      ansible.builtin.stat:
        path: "{{ file.path }}"
        checksum_algorithm: "sha256"
        get_checksum: true
      loop: "{{ template_backup_files.files }}"
      loop_control:
        loop_var: "file"
        label: "{{ file.path }}"
      register: "new_backup_checksums"

    - name: "Retrieving all existing backup config files with checksums"
      ansible.builtin.find:
        paths: "{{ certificate_backup_path }}"
        patterns: "*.{{ context_vars.config_file }}"
        file_type: "file"
        get_checksum: true
        checksum_algorithm: "sha256"
      register: "existing_backup_files"

    - name: "Creating list of existing backup checksums"
      ansible.builtin.set_fact:
        existing_checksums: "{{ existing_backup_files.files | map(attribute='checksum') | list }}"

    - name: "Processing each unique backup file (copy only if content is different)"
      ansible.builtin.include_tasks: "copy_and_remove_file.yml"
      loop: "{{ new_backup_checksums.results }}"
      loop_control:
        index_var: "index"
        loop_var: "file_stat"
        label: "{{ file_stat.stat.path }}"
      when: file_stat.stat.checksum not in existing_checksums

    - name: "Removing duplicate backup files (same content as existing backups)"
      ansible.builtin.file:
        path: "{{ file_stat.stat.path }}"
        state: "absent"
      loop: "{{ new_backup_checksums.results }}"
      loop_control:
        loop_var: "file_stat"
        label: "{{ file_stat.stat.path }}"
      when: file_stat.stat.checksum in existing_checksums

    - name: "Retrieving updated backup config files for retention cleanup"
      ansible.builtin.find:
        paths: "{{ certificate_backup_path }}"
        patterns: "*.{{ context_vars.config_file }}"
        file_type: "file"
      register: "backup_config_files"

    - name: "Removing old backup config files beyond retention limit leaving only the most recent {{ context_vars.backup_config_files_to_keep }} files"
      when: backup_config_files.files | length > 0
      ansible.builtin.file:
        path: "{{ file.path }}"
        state: "absent"
      loop: "{{ (backup_config_files.files | sort(attribute='mtime'))[0 : -context_vars.backup_config_files_to_keep] | list }}"
      loop_control:
        loop_var: "file"
        label: "{{ file.path }}"
