---
- name: "Loading certificate file details from '{{ certificate_file }}'"
  community.crypto.x509_certificate_info:
    path: "{{ certificate_file }}"
    valid_at:
      point_1: "+{{ config_vars.auto_renewal.days_for_yellow_alert }}d"
      point_2: "+{{ config_vars.auto_renewal.days_for_red_alert }}d"
  register: "certificate_info"

- name: "Determining alert zone for certificate"
  ansible.builtin.set_fact:
    certificate_alert_is_yellow: "{{ not certificate_info.valid_at.point_1 }}"
    certificate_alert_is_red: "{{ not certificate_info.valid_at.point_2 }}"
    certificate_alert_is_expired: "{{ certificate_info.expired }}"

- name: "Formatting certificate serial number from Decimal to Hex with colons"
  ansible.builtin.include_role:
    name: "common"
    tasks_from: "utils/format_certificate_serial.yml"
  vars:
    input_serial_decimal: "{{ certificate_info.serial_number }}"

- name: "Merging formatted serial number into certificate_info"
  ansible.builtin.set_fact:
    certificate_info: "{{ certificate_info | combine({'formatted_serial_number': formatted_serial_number}, recursive=True) }}"

- name: "Preparing notification variables"
  ansible.builtin.set_fact:
    certificate_common_name: "{{ certificate_info.subject.commonName }}"
    certificate_days_to_expire: "{{ ((certificate_info.not_after | to_datetime(context_vars.certificate_datetime_format)) -
                                    (ansible_facts['date_time']['iso8601'] | to_datetime(context_vars.ansible_datetime_format))).days }}"

    # Formatting certificate dates for display.
    certificate_not_before_formatted: "{{ context_vars.display_datetime_format
                                        | strftime((certificate_info.not_before | to_datetime(context_vars.certificate_datetime_format)).timestamp() | int) }}"
    certificate_not_after_formatted: "{{ context_vars.display_datetime_format
                                        | strftime((certificate_info.not_after | to_datetime(context_vars.certificate_datetime_format)).timestamp() | int) }}"

    # Setting file extension variables for template.
    private_key_extension: "{{ config_vars.private_key.extension }}"
    certificate_extension: "{{ config_vars.certificate.extension }}"

    # Optional AWX integration (set empty if not configured).
    awx_job_details_url: "{{ context_vars.awx_job_details_url | default('') }}"

    # Only Vault has web UI with clickable URLs.
    secret_access_url: "{{ context_vars.ansible_hashi_vault_addr ~ context_vars.vault_ui_base_path ~ '/' ~
                          config_vars.private_key.secret_provider_mount_point ~ '/show/' ~
                          config_vars.private_key.secret_base_path ~ '/' ~ secret_key
                          if config_vars.private_key.secret_provider == 'vault' else '' }}"
    secret_provider: "{{ config_vars.private_key.secret_provider }}"
    secret_key: "{{ certificate_domain ~ '/' ~ certificate_environment ~ '/' ~ certificate_name }}"

    # Optional GLPI integration (set empty if not configured).
    glpi_certificate_id: "{{ context_vars.glpi_certificate_id | default('') }}"
    glpi_front_get_certificate_url: "{{ context_vars.glpi_front_get_certificate_url | default('') }}"
    glpi_front_search_certificate_url: "{{ context_vars.glpi_front_search_certificate_url | default('') }}"
    glpi_field_name: "{{ context_vars.glpi_field_name | default('') }}"

- name: "Setting the 'who executed' audit message"
  when: (awx_user_name is defined)
  ansible.builtin.set_fact:
    who_executed: "{{ awx_user_name }}{{' - ' ~ awx_user_email if (awx_user_email is defined and awx_user_email) else ''}}"

- name: "Setting email subject for new certificate"
  when: notification_context == "creating"
  ansible.builtin.set_fact:
    mail_subject: "[SSL] The certificate: {{ certificate_common_name }} was created"
    mail_main_message: >
      The certificate '<strong>{{ certificate_common_name }}</strong>' was created
      using <strong>{{ config_vars.certificate_ca_name | default(config_vars.certificate.signing_provider) }}</strong>.

- name: "Setting email subject for importing certificate"
  when: notification_context == "importing"
  ansible.builtin.set_fact:
    mail_subject: "[SSL] The certificate: {{ certificate_common_name }} was imported"
    mail_main_message: >
      The certificate '<strong>{{ certificate_common_name }}</strong>' was imported into '<strong>{{ import_type }}</strong>'.

- name: "Setting email subject for scheduled verification alerts"
  when: notification_context == "scheduled"
  block:
    - name: "Setting email subject for certificate nearing expiration (yellow alert)"
      when: certificate_alert_is_yellow
      ansible.builtin.set_fact:
        mail_subject: "[SSL][Attention] - The certificate {{ certificate_common_name }} is expiring in {{ certificate_days_to_expire }} days"
        mail_main_message: >
          The certificate '<strong>{{ certificate_common_name }}</strong>' is expiring in
          <strong style='color: red;'>{{ certificate_days_to_expire }}</strong> days.

    - name: "Setting email subject for critical certificate expiration (red alert)"
      when: certificate_alert_is_red
      ansible.builtin.set_fact:
        mail_subject: "[SSL][Alert] - The certificate {{ certificate_common_name }} is expiring in {{ certificate_days_to_expire }} days"
        mail_main_message: >
          The certificate '<strong>{{ certificate_common_name }}</strong>' is expiring in
          <strong style='color: red;'>{{ certificate_days_to_expire }}</strong> days.

    - name: "Setting email subject for expired certificate notification"
      when: certificate_alert_is_expired
      ansible.builtin.set_fact:
        mail_subject: "[SSL][Urgent] - The certificate {{ certificate_common_name }} is expired"
        mail_main_message: >
          The certificate '<strong>{{ certificate_common_name }}</strong>' is expired.

- name: "Printing notification variables"
  when: debug | bool
  ansible.builtin.debug:
    msg:
      - "who_executed: {{ who_executed | default('Not defined') }}"
      - "Mail Subject: {{ mail_subject | default('Not defined') }}"
      - "Mail Main Message: {{ mail_main_message | default('Not defined') }}"
