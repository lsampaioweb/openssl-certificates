---
galaxy_info:
  namespace: "lsampaioweb"
  role_name: "certificate"
  author: "Luciano Sampaio"
  description: "Issues and manages SSL/TLS certificates using OpenSSL CLI and HashiCorp Vault PKI engine with automated lifecycle management."
  license: "MIT"
  company: "Homelab"

  min_ansible_version: "2.15"

  platforms:
    - name: "Debian"
      versions:
        - "bullseye"
        - "bookworm"
    - name: "Ubuntu"
      versions:
        - "focal"
        - "jammy"
    - name: "MacOSX"
      versions:
        - "all"

  galaxy_tags:
    - "ssl"
    - "tls"
    - "certificate"
    - "pki"
    - "vault"
    - "hashicorp"
    - "crypto"
    - "security"

dependencies:
  - role: "common"
