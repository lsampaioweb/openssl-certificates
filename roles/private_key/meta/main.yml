---
galaxy_info:
  namespace: "lsampaioweb"
  role_name: "private_key"
  author: "Luciano Sampaio"
  description: "Generates and manages RSA/ECC private keys for SSL/TLS certificates with optional passphrase protection."
  license: "MIT"
  company: "Homelab"

  min_ansible_version: "2.15"

  platforms:
    - name: "Debian"
      versions:
        - "bullseye"
        - "bookworm"
    - name: "Ubuntu"
      versions:
        - "focal"
        - "jammy"
    - name: "MacOSX"
      versions:
        - "all"

  galaxy_tags:
    - "ssl"
    - "tls"
    - "certificate"
    - "pki"
    - "privatekey"
    - "crypto"
    - "security"

dependencies:
  - role: "common"
