[defaults]
# Specify the inventory file to be used by Ansible.
inventory = inventory/hosts

# Enable specific callback plugins to display execution time per role and task.
# - `timer`: Shows the total execution time of the playbook.
# - `profile_roles`: Displays the execution time of each role.
callbacks_enabled = timer, profile_roles

# Enable fact caching to speed up playbook execution by avoiding redundant data collection.
# Enable fact caching to reduce fact gathering time.
# Other fact caching backends:
  # memory: Stores in RAM but resets when Ansible exits.
  # jsonfile (default): Stores facts as JSON in a local directory (/tmp/ansible_facts).
  # redis: Faster but requires a Redis server.
  # yaml: Similar to jsonfile but stores in YAML format.
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
# Cache facts for 1 hour (adjust as needed).
fact_caching_timeout = 3600

# Set the default strategy to `free`, allowing tasks to run asynchronously across hosts.
# Uncomment to enable if needed.
# strategy = free

[ssh_connection]
# Enable SSH pipelining to reduce the number of SSH operations, improving performance.
# Recommended when using `become` (sudo) since it avoids creating multiple SSH sessions.
pipelining = true

# Set the SSH connection timeout to 240 seconds.
# This helps in environments where SSH connections might be slow or intermittent.
timeout = 240

# Optimize SSH connections by using persistent control connections.
# - `ControlMaster=auto`: Enables automatic connection sharing.
# - `ControlPersist=300s`: Keeps the connection open for 5 minutes after last use, reducing overhead.
ssh_args = -o ControlMaster=auto -o ControlPersist=300s

# Disable host key checking to prevent SSH from prompting for confirmation when connecting to new hosts.
# WARNING: This is a security risk as it allows MITM attacks. Only disable it in controlled environments.
# host_key_checking = false
